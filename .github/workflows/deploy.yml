name: Deploy to GitHub Pages

# Build the static site and publish out/ to GitHub Pages.
# Requires repo setting: Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for actions/deploy-pages (OIDC) to publish. Without pages:write and
# id-token:write the deploy step fails.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      # `npm run build` (NOT `next build`) so prebuild -> build:data regenerates
      # public/data/leads.json before the static export runs.
      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
